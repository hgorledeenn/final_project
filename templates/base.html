<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Who Owns This Block{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('map_view') }}">Who Owns This Block</a>
    <nav>
      <a href="{{ url_for('map_view') }}">Map</a>
      <a href="{{ url_for('buildings_list') }}">Buildings</a>
      <a href="{{ url_for('people_list') }}">People</a>
    </nav>
  </header>
  <main class="container {% block container_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    Data: NYC HPD Multiple Dwelling Registrations &amp; ACRIS Real Property records.
  </footer>
</body>
</html>
